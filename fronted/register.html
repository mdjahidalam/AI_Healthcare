<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <link rel="stylesheet"
          href="css/register.css">

</head>

<body>

<div class="register-container">

    <div class="register-card">

        <h1>AI Healthcare</h1>

        <h3>Create New Account</h3>

        <form id="registerForm">

            <input
                type="text"
                id="name"
                placeholder="Full Name"
                required>

            <input
                type="email"
                id="email"
                placeholder="Email"
                required>

            <input
                type="password"
                id="password"
                placeholder="Password"
                required>

            <input
                type="password"
                id="confirmPassword"
                placeholder="Confirm Password"
                required>

            <button type="submit">

                Register

            </button>

        </form>

        <p id="message"></p>

        <div class="login-link">

            Already have an account?

            <a href="index.html">

                Login

            </a>

        </div>

    </div>

</div>

<script src="js/register.js"></script>

</body>

</html>
