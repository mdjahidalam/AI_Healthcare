<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>AI Healthcare Login</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<div class="login-container">

    <div class="login-card">

        <h1>AI Healthcare</h1>

        <p>Heart Disease Prediction System</p>

        <form id="loginForm">

            <input
                type="email"
                id="email"
                placeholder="Email"
                required>

            <input
                type="password"
                id="password"
                placeholder="Password"
                required>

            <button type="submit">

                Login

            </button>
        </form>
         <div class="register-link">

    Don't have an account?

    <a href="register.html">

        Register Here

    </a>

</div>

        <p id="message"></p>

    </div>

</div>

<script src="js/login.js"></script>

</body>

</html>
